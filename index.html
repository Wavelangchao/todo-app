<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>
<style>
  :root {
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #1a1a2e;
    --sub: #6b7280;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --accent-light: #eef2ff;
    --danger: #ef4444;
    --danger-light: #fef2f2;
    --border: #e5e7eb;
    --done: #9ca3af;
    --shadow: 0 4px 24px rgba(0,0,0,.06);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.10);
    --radius: 14px;
    --radius-sm: 10px;
    --radius-xs: 6px;
    --prio-high: #ef4444;
    --prio-med: #f59e0b;
    --prio-low: #22c55e;
    --overlay: rgba(0,0,0,.40);
    --toast-bg: #1f2937;
  }
  body.dark {
    --bg: #111827;
    --card: #1f2937;
    --text: #f3f4f6;
    --sub: #9ca3af;
    --accent: #818cf8;
    --accent-hover: #6366f1;
    --accent-light: #1e1b4b;
    --border: #374151;
    --shadow: 0 4px 24px rgba(0,0,0,.30);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.50);
    --overlay: rgba(0,0,0,.65);
    --toast-bg: #374151;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px 80px;
    transition: background .3s, color .3s;
  }
  .app { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 18px; }

  /* ---- header ---- */
  .top-bar { display: flex; justify-content: space-between; align-items: center; }
  .top-bar h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .top-bar .actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--card); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; color: var(--sub); position: relative;
  }
  .icon-btn:hover { background: var(--accent-light); color: var(--accent); border-color: var(--accent); }
  .icon-btn .tooltip {
    position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
    font-size: 11px; white-space: nowrap; background: var(--toast-bg); color: #fff;
    padding: 3px 8px; border-radius: 4px; pointer-events: none; opacity: 0; transition: opacity .15s;
  }
  .icon-btn:hover .tooltip { opacity: 1; }

  /* ---- date ---- */
  .date-row { font-size: 13px; color: var(--sub); }

  /* ---- search ---- */
  .search-wrap {
    display: flex; gap: 8px; background: var(--card); border-radius: var(--radius);
    padding: 8px; box-shadow: var(--shadow); align-items: center;
  }
  .search-wrap input {
    flex: 1; border: none; outline: none; font-size: 14px; padding: 8px;
    background: transparent; color: var(--text);
  }
  .search-wrap input::placeholder { color: #b0b7c3; }
  .search-wrap .clear-search {
    background: none; border: none; color: var(--sub); cursor: pointer;
    font-size: 18px; padding: 0 8px; display: none;
  }
  .search-wrap .clear-search.visible { display: block; }

  /* ---- add bar ---- */
  .add-bar {
    display: flex; gap: 6px; background: var(--card); border-radius: var(--radius);
    padding: 6px; box-shadow: var(--shadow); flex-wrap: wrap;
  }
  .add-bar input, .add-bar select {
    border: 1px solid var(--border); border-radius: var(--radius-xs); outline: none;
    font-size: 14px; background: var(--bg); color: var(--text); padding: 8px 10px;
  }
  .add-bar input { flex: 2; min-width: 140px; }
  .add-bar select { flex: 1; min-width: 70px; cursor: pointer; }
  .add-bar input[type="date"] { flex: 1; min-width: 100px; cursor: pointer; color-scheme: light; }
  body.dark .add-bar input[type="date"] { color-scheme: dark; }
  .add-bar .btn-add {
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius-xs);
    padding: 8px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background .15s; white-space: nowrap;
  }
  .add-bar .btn-add:hover { background: var(--accent-hover); }

  /* ---- toolbar ---- */
  .toolbar { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .toolbar .chip {
    border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 13px; cursor: pointer; font-size: 13px; color: var(--sub);
    background: transparent; transition: all .15s; white-space: nowrap;
  }
  .toolbar .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .toolbar .chip:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
  .toolbar .spacer { flex: 1; }
  .toolbar select {
    border: 1px solid var(--border); border-radius: 20px; padding: 5px 10px;
    font-size: 13px; color: var(--sub); background: transparent; cursor: pointer;
    outline: none;
  }

  /* ---- progress ---- */
  .progress-wrap { display: flex; align-items: center; gap: 10px; }
  .progress-bar {
    flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden;
  }
  .progress-bar .fill {
    height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s ease;
  }
  .progress-wrap span { font-size: 12px; color: var(--sub); white-space: nowrap; }

  /* ---- list ---- */
  .list { display: flex; flex-direction: column; gap: 6px; }
  .todo {
    display: flex; align-items: center; gap: 10px;
    background: var(--card); border-radius: var(--radius-sm); padding: 12px 14px;
    box-shadow: 0 1px 3px rgba(0,0,0,.04); transition: all .2s;
    animation: slideIn .25s ease;
    position: relative;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(40px); } }
  .todo.removing { animation: slideOut .2s ease forwards; }

  .todo:hover { box-shadow: var(--shadow); }
  .todo.done .todo-text { text-decoration: line-through; color: var(--done); }
  .todo.overdue { border-left: 3px solid var(--prio-high); }

  .todo .prio-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .prio-high { background: var(--prio-high); }
  .prio-med  { background: var(--prio-med); }
  .prio-low  { background: var(--prio-low); }

  .todo input[type="checkbox"] {
    appearance: none; width: 20px; height: 20px; border: 2px solid #d1d5db;
    border-radius: 50%; flex-shrink: 0; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center;
  }
  .todo input[type="checkbox"]:checked { background: var(--accent); border-color: var(--accent); }
  .todo input[type="checkbox"]:checked::after { content: "✓"; color: #fff; font-size: 12px; font-weight: 700; }

  .todo-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; cursor: pointer; }
  .todo-text { font-size: 14px; word-break: break-word; line-height: 1.4; }
  .todo-text:focus {
    outline: 2px solid var(--accent); outline-offset: 4px; border-radius: 4px;
    background: var(--accent-light); padding: 2px 4px; margin: -2px -4px;
  }
  .todo-meta { display: flex; gap: 8px; flex-wrap: wrap; font-size: 11px; color: var(--sub); }
  .todo-meta .cat-tag {
    background: var(--accent-light); color: var(--accent); padding: 1px 7px;
    border-radius: 10px; font-size: 11px;
  }
  .todo-meta .due-tag { display: flex; align-items: center; gap: 3px; }
  .todo-meta .due-tag.overdue-text { color: var(--prio-high); font-weight: 600; }
  .todo-meta .due-tag.today-text { color: var(--prio-med); font-weight: 600; }

  .todo-actions { display: flex; gap: 2px; flex-shrink: 0; }
  .todo-actions button {
    background: none; border: none; color: #9ca3af; cursor: pointer;
    font-size: 16px; line-height: 1; padding: 4px 5px; border-radius: var(--radius-xs);
    transition: all .15s;
  }
  .todo-actions button:hover { color: var(--text); background: var(--bg); }
  .todo-actions .btn-del:hover { color: var(--danger); background: var(--danger-light); }

  /* ---- footer ---- */
  .footer {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--sub); gap: 8px; flex-wrap: wrap;
  }
  .footer button {
    background: none; border: 1px solid var(--border); color: var(--sub);
    cursor: pointer; font-size: 12px; padding: 5px 12px; border-radius: 20px;
    transition: all .15s;
  }
  .footer button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .empty-state {
    text-align: center; padding: 48px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .empty-state .icon { font-size: 48px; opacity: .6; }
  .empty-state p { color: var(--sub); font-size: 14px; }

  /* ---- toast ---- */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--toast-bg); color: #fff; padding: 10px 20px; border-radius: 20px;
    font-size: 13px; box-shadow: var(--shadow-lg); z-index: 99;
    display: flex; align-items: center; gap: 12px;
    animation: toastIn .25s ease;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
  .toast button { background: none; border: none; color: #818cf8; cursor: pointer; font-weight: 600; font-size: 13px; }

  /* ---- modal ---- */
  .modal-overlay {
    position: fixed; inset: 0; background: var(--overlay); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--card); border-radius: var(--radius); padding: 24px;
    width: 90%; max-width: 380px; box-shadow: var(--shadow-lg);
    display: flex; flex-direction: column; gap: 16px;
  }
  .modal h3 { font-size: 16px; }
  .modal p  { font-size: 14px; color: var(--sub); line-height: 1.6; }
  .modal textarea {
    width: 100%; border: 1px solid var(--border); border-radius: var(--radius-xs);
    padding: 10px; font-size: 14px; resize: vertical; min-height: 80px;
    background: var(--bg); color: var(--text); outline: none; font-family: monospace;
  }
  .modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btns button {
    border-radius: var(--radius-xs); padding: 8px 18px; font-size: 14px;
    cursor: pointer; border: 1px solid var(--border); background: var(--card);
    color: var(--text); transition: all .15s;
  }
  .modal-btns button.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-btns button.primary:hover { background: var(--accent-hover); }
  .modal-btns button:hover { background: var(--bg); }

  /* ---- responsive ---- */
  @media (max-width: 480px) {
    body { padding: 20px 10px 60px; }
    .top-bar h1 { font-size: 22px; }
    .add-bar { flex-direction: column; }
    .add-bar input, .add-bar select { flex: auto; width: 100%; }
    .toolbar { gap: 4px; }
    .toolbar .chip { padding: 4px 10px; font-size: 12px; }
  }
</style>
</head>
<body>
<div class="app-layout">
  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">Todo</span>
      <button class="sidebar-toggle" id="btn-toggle-sidebar" title="折叠侧边栏 (Ctrl+B)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="10,3 5,8 10,13"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- 动态渲染分类列表 -->
    </nav>
    <div class="sidebar-footer">
      <button class="btn-new-cat" id="btn-new-cat">+ 新分类</button>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="main">
    <!-- 命令栏 -->
    <div class="command-bar" id="command-bar">
      <span class="cmd-icon">🔍</span>
      <input type="text" id="cmd-input" class="cmd-input" placeholder="搜索或输入命令... (Ctrl+K)" autocomplete="off">
      <div class="cmd-dropdown" id="cmd-dropdown">
        <div class="cmd-results" id="cmd-results"></div>
        <div class="cmd-actions" id="cmd-actions">
          <button class="cmd-action" data-action="add">＋ 添加任务</button>
          <button class="cmd-action" data-action="clear-done">🗑 清除已完成</button>
          <button class="cmd-action" data-action="export">📤 导出数据</button>
        </div>
      </div>
    </div>

    <!-- 统计条 -->
    <div class="stats-bar">
      <div class="stats-info">
        <span id="stats-text">3 项未完成 · 共 5 项</span>
        <span class="stats-dot">·</span>
        <div class="progress-mini" id="progress-mini">
          <div class="progress-mini-fill" id="progress-mini-fill"></div>
        </div>
        <span id="progress-pct">60%</span>
      </div>
      <div class="stats-tools">
        <select id="filter-select" class="filter-select">
          <option value="all">全部</option>
          <option value="active">未完成</option>
          <option value="done">已完成</option>
          <option value="high">高优先</option>
          <option value="overdue">已逾期</option>
        </select>
        <select id="sort-select" class="sort-select">
          <option value="newest">最新优先</option>
          <option value="oldest">最早优先</option>
          <option value="priority">优先级</option>
          <option value="due">截止日期</option>
          <option value="name">名称 A-Z</option>
        </select>
        <button class="icon-btn-mini" id="btn-theme" title="主题">🌓</button>
        <button class="icon-btn-mini" id="btn-export" title="导出">📤</button>
        <button class="icon-btn-mini" id="btn-import" title="导入">📥</button>
      </div>
    </div>

    <!-- 添加任务行 -->
    <div class="add-row" id="add-row">
      <span class="add-prio-bar prio-med-bar"></span>
      <button class="add-checkbox-placeholder">+</button>
      <div class="add-input-area" id="add-input-area">
        <input type="text" class="add-input" id="add-input" placeholder="添加任务，按回车确认..." maxlength="200">
        <div class="add-options" id="add-options">
          <select id="add-priority" class="add-select">
            <option value="low">低优先</option>
            <option value="med" selected>中优先</option>
            <option value="high">高优先</option>
          </select>
          <select id="add-category" class="add-select">
            <option value="个人">👤 个人</option>
            <option value="工作">💼 工作</option>
            <option value="学习">📚 学习</option>
            <option value="生活">🏠 生活</option>
          </select>
          <input type="date" id="add-due" class="add-date">
        </div>
      </div>
    </div>

    <!-- 任务列表 -->
    <div class="task-list" id="task-list">
      <!-- 动态渲染 -->
    </div>

    <!-- 底部操作 -->
    <div class="bottom-bar">
      <button class="btn-text" id="btn-clear-done">清除已完成</button>
      <button class="btn-text btn-text-danger" id="btn-clear-all">清空全部</button>
    </div>
  </main>
</div>

<!-- 隐藏的 import input -->
<input type="file" id="import-file" accept=".json" style="display:none;">
<!-- Toast 容器 -->
<div class="toast-container" id="toast-container"></div>

<script>
(() => {
  const STORAGE_KEY = 'todo-app-pro-v3';

  // ---- state ----
  let todos = [];
  let filter = 'all';
  let sortBy = 'newest';
  let searchQuery = '';
  let lastDeleted = null;   // for undo
  let toastTimer = null;

  // ---- DOM refs ----
  const $ = (sel, ctx) => (ctx || document).querySelector(sel);
  const $$ = (sel, ctx) => [...(ctx || document).querySelectorAll(sel)];

  const $input    = $('#input');
  const $priority = $('#priority');
  const $category = $('#category');
  const $dueDate  = $('#due-date');
  const $search   = $('#search');
  const $clearSearch = $('#clear-search');
  const $list     = $('#list');
  const $count    = $('#count');
  const $date     = $('#date');
  const $sortBy   = $('#sort-by');
  const $progressFill = $('#progress-fill');
  const $progressText = $('#progress-text');
  const $filterChips = $$('#list'); // placeholder — will bind below

  // ---- date ----
  function updateDate() {
    const now = new Date();
    const week = ['日','一','二','三','四','五','六'];
    $date.textContent = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 星期${week[now.getDay()]}`;
  }
  updateDate();

  // ---- load / save ----
  function load() {
    try { todos = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { todos = []; }
  }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); }

  // ---- helpers ----
  function fmtDate(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function fmtDateTime(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  function esc(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }
  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function prioLabel(p) { return {high:'高',med:'中',low:'低'}[p] || '中'; }
  function prioWeight(p) { return {high:0,med:1,low:2}[p] || 1; }
  function isOverdue(t) {
    if (!t.due || t.done) return false;
    return t.due < todayStr();
  }
  function isToday(t) {
    if (!t.due || t.done) return false;
    return t.due === todayStr();
  }

  // ---- toast ----
  function showToast(msg, actionLabel, actionFn) {
    const old = $('.toast');
    if (old) old.remove();
    if (toastTimer) clearTimeout(toastTimer);

    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `<span>${msg}</span>` + (actionLabel ? `<button>${actionLabel}</button>` : '');
    document.body.appendChild(el);

    if (actionLabel && actionFn) {
      el.querySelector('button').addEventListener('click', () => {
        actionFn();
        el.remove();
      });
    }

    toastTimer = setTimeout(() => {
      el.style.opacity = '0';
      el.style.transition = 'opacity .2s';
      setTimeout(() => el.remove(), 200);
    }, 3000);
  }

  // ---- filtered + sorted list ----
  function getFilteredAndSorted() {
    let result = [...todos];

    // filter
    switch (filter) {
      case 'active':  result = result.filter(t => !t.done); break;
      case 'done':    result = result.filter(t => t.done); break;
      case 'high':    result = result.filter(t => !t.done && t.priority === 'high'); break;
      case 'overdue': result = result.filter(t => isOverdue(t)); break;
    }

    // search
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      result = result.filter(t => t.text.toLowerCase().includes(q) || (t.cat || '').toLowerCase().includes(q));
    }

    // sort
    switch (sortBy) {
      case 'oldest':    result.sort((a,b) => a.ts - b.ts); break;
      case 'priority':  result.sort((a,b) => prioWeight(a.priority) - prioWeight(b.priority) || a.ts - b.ts); break;
      case 'due':
        result.sort((a,b) => {
          if (!a.due && !b.due) return a.ts - b.ts;
          if (!a.due) return 1;
          if (!b.due) return -1;
          return a.due.localeCompare(b.due) || a.ts - b.ts;
        });
        break;
      case 'name': result.sort((a,b) => a.text.localeCompare(b.text, 'zh')); break;
      default: /* newest */ result.sort((a,b) => b.ts - a.ts); break;
    }

    return result;
  }

  // ---- render ----
  function render() {
    const filtered = getFilteredAndSorted();
    const activeCount = todos.filter(t => !t.done).length;
    const doneCount = todos.length - activeCount;
    const pct = todos.length ? Math.round((doneCount / todos.length) * 100) : 0;

    $progressFill.style.width = pct + '%';
    $progressText.textContent = `${pct}%`;
    $count.textContent = `${activeCount} 项未完成 / 共 ${todos.length} 项`;

    if (!filtered.length) {
      const msgs = {
        all: '还没有任务，添加一个吧 ✨',
        active: '所有任务已完成 🎉',
        done: '还没有已完成的任务',
        high: '没有高优先级任务',
        overdue: '没有逾期任务 👍',
      };
      $list.innerHTML = `<div class="empty-state"><span class="icon">${filter === 'active' ? '🎉' : '📋'}</span><p>${msgs[filter] || '没有匹配的任务'}</p></div>`;
      return;
    }

    $list.innerHTML = filtered.map(t => {
      const idx = todos.indexOf(t);
      const overdue = isOverdue(t);
      const today = isToday(t);
      let dueHtml = '';
      if (t.due) {
        const cls = overdue ? 'overdue-text' : (today ? 'today-text' : '');
        dueHtml = `<span class="due-tag ${cls}">📅 ${t.due}${overdue ? ' (逾期)' : (today ? ' (今天)' : '')}</span>`;
      }
      return `
        <div class="todo${t.done ? ' done' : ''}${overdue ? ' overdue' : ''}" data-idx="${idx}">
          <span class="prio-dot prio-${t.priority || 'med'}" title="优先级: ${prioLabel(t.priority)}"></span>
          <input type="checkbox" ${t.done ? 'checked' : ''} data-idx="${idx}" title="切换完成状态">
          <div class="todo-main" data-idx="${idx}" title="双击编辑">
            <span class="todo-text" contenteditable="false">${esc(t.text)}</span>
            <div class="todo-meta">
              <span class="cat-tag">${esc(t.cat || '个人')}</span>
              ${dueHtml}
              <span>${fmtDateTime(t.ts)}</span>
            </div>
          </div>
          <div class="todo-actions">
            <button class="btn-edit" data-idx="${idx}" title="编辑">✎</button>
            <button class="btn-del" data-idx="${idx}" title="删除">×</button>
          </div>
        </div>`;
    }).join('');
  }

  // ---- actions ----
  function addTodo() {
    const text = $input.value.trim();
    if (!text) return;
    todos.unshift({
      text,
      done: false,
      priority: $priority.value,
      cat: $category.value,
      due: $dueDate.value || null,
      ts: Date.now(),
    });
    $input.value = '';
    $dueDate.value = '';
    save(); render();
  }

  function toggleTodo(idx) {
    if (idx < 0 || idx >= todos.length) return;
    todos[idx].done = !todos[idx].done;
    if (todos[idx].done) todos[idx].completedTs = Date.now();
    else delete todos[idx].completedTs;
    save(); render();
  }

  function removeTodo(idx) {
    if (idx < 0 || idx >= todos.length) return;
    lastDeleted = { item: todos[idx], idx };
    todos.splice(idx, 1);
    save(); render();
    showToast('已删除', '撤销', () => {
      todos.splice(lastDeleted.idx, 0, lastDeleted.item);
      save(); render();
      showToast('已恢复');
    });
  }

  function editTodoText(idx) {
    const span = document.querySelector(`.todo[data-idx="${idx}"] .todo-text`);
    if (!span) return;
    span.contentEditable = 'true';
    span.focus();
    // select all text
    const range = document.createRange();
    range.selectNodeContents(span);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function commitEdit(idx) {
    const span = document.querySelector(`.todo[data-idx="${idx}"] .todo-text`);
    if (!span || span.contentEditable !== 'true') return;
    span.contentEditable = 'false';
    const newText = span.textContent.trim();
    if (newText && idx >= 0 && idx < todos.length) {
      todos[idx].text = newText;
      save();
    }
    render();
  }

  function clearDone() {
    const count = todos.filter(t => t.done).length;
    if (!count) return;
    todos = todos.filter(t => !t.done);
    save(); render();
    showToast(`已清除 ${count} 项已完成任务`);
  }

  function clearAll() {
    if (!todos.length) return;
    if (!confirm(`确定要删除全部 ${todos.length} 项任务吗？此操作不可撤销。`)) return;
    todos = [];
    save(); render();
    showToast('已清空全部任务');
  }

  // ---- export / import ----
  function exportData() {
    const blob = new Blob([JSON.stringify(todos, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `todo-backup-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('数据已导出');
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!Array.isArray(data)) throw new Error('格式错误');
        // basic validation
        for (const item of data) {
          if (!item.text || typeof item.text !== 'string') throw new Error('数据格式不正确');
        }
        if (!confirm(`即将导入 ${data.length} 项任务。\n选择"确定"将替换当前数据，选择"取消"将合并到当前列表。`)) {
          // merge: prepend imported items
          const merged = [...data, ...todos];
          // dedupe by text+ts
          const seen = new Set();
          todos = merged.filter(t => {
            const key = t.text + t.ts;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
          });
        } else {
          todos = data;
        }
        save(); render();
        showToast(`成功导入 ${data.length} 项任务`);
      } catch(e) {
        alert('导入失败：文件格式不正确，请选择有效的 JSON 备份文件。');
      }
    };
    reader.readAsText(file);
  }

  // ---- theme ----
  function applyTheme() {
    const dark = localStorage.getItem('todo-theme') === 'dark';
    document.body.classList.toggle('dark', dark);
  }
  function toggleTheme() {
    const dark = !document.body.classList.contains('dark');
    localStorage.setItem('todo-theme', dark ? 'dark' : 'light');
    applyTheme();
  }

  // ---- event bindings ----
  function bindEvents() {
    // add
    $('#btn-add').addEventListener('click', addTodo);
    $input.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addTodo(); }
    });

    // search
    $search.addEventListener('input', () => {
      searchQuery = $search.value.trim();
      $clearSearch.classList.toggle('visible', !!searchQuery);
      render();
    });
    $clearSearch.addEventListener('click', () => {
      $search.value = '';
      searchQuery = '';
      $clearSearch.classList.remove('visible');
      render();
      $search.focus();
    });

    // filter chips
    $$('.toolbar .chip').forEach(chip => {
      chip.addEventListener('click', () => {
        $$('.toolbar .chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        filter = chip.dataset.filter;
        render();
      });
    });

    // sort
    $sortBy.addEventListener('change', () => {
      sortBy = $sortBy.value;
      render();
    });

    // list: checkbox, delete, edit, double-click
    $list.addEventListener('click', e => {
      const cb = e.target.closest('input[type="checkbox"]');
      const del = e.target.closest('.btn-del');
      const edit = e.target.closest('.btn-edit');
      if (cb) { toggleTodo(Number(cb.dataset.idx)); return; }
      if (del) { removeTodo(Number(del.dataset.idx)); return; }
      if (edit) { editTodoText(Number(edit.dataset.idx)); return; }
    });

    $list.addEventListener('dblclick', e => {
      const main = e.target.closest('.todo-main');
      if (main) editTodoText(Number(main.dataset.idx));
    });

    // commit inline edit on blur or Enter
    $list.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.classList.contains('todo-text')) {
        e.preventDefault();
        const todoEl = e.target.closest('.todo');
        if (todoEl) commitEdit(Number(todoEl.dataset.idx));
      }
    });
    $list.addEventListener('focusout', e => {
      if (e.target.classList.contains('todo-text')) {
        const todoEl = e.target.closest('.todo');
        if (todoEl) commitEdit(Number(todoEl.dataset.idx));
      }
    });

    // clear
    $('#clear-done').addEventListener('click', clearDone);
    $('#clear-all').addEventListener('click', clearAll);

    // theme
    $('#btn-theme').addEventListener('click', toggleTheme);

    // export
    $('#btn-export').addEventListener('click', exportData);

    // import
    $('#btn-import').addEventListener('click', () => $('#import-file').click());
    $('#import-file').addEventListener('change', e => {
      if (e.target.files[0]) importData(e.target.files[0]);
      e.target.value = '';
    });

    // global keyboard shortcuts
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        $search.focus();
      }
      if (e.key === 'Escape' && document.activeElement === $search) {
        $search.value = '';
        searchQuery = '';
        $clearSearch.classList.remove('visible');
        $search.blur();
        render();
      }
    });

    // set today as default for due date picker
    $dueDate.value = '';
  }

  // ---- init ----
  load();
  applyTheme();
  bindEvents();
  render();
  $input.focus();
})();
</script>
</body>
</html>
