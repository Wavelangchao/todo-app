<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todo</title>
<style>
  :root {
    --bg: #ffffff;
    --sidebar-bg: #f9fafb;
    --text: #1a1a1a;
    --text-secondary: #8a8a8a;
    --accent: #5b5fd9;
    --accent-hover: #4a4fc4;
    --accent-light: #f0f0ff;
    --border: #e6e8ec;
    --hover-bg: #f5f5f5;
    --selected-bg: #f0f0ff;
    --danger: #e5484d;
    --danger-light: #fef2f2;
    --prio-high: #e5484d;
    --prio-med: #f5a623;
    --prio-low: #5b5fd9;
    --done-color: #8a8a8a;
    --radius: 8px;
    --radius-sm: 6px;
    --sidebar-width: 240px;
    --sidebar-collapsed: 48px;
    --overlay: rgba(0,0,0,.40);
    --toast-bg: #1f2937;
    --cmd-bg: #f9fafb;
    --shadow-dropdown: 0 12px 40px rgba(0,0,0,.12);
  }

  body.dark {
    --bg: #0d0d0d;
    --sidebar-bg: #141414;
    --text: #e5e5e5;
    --text-secondary: #6b6b6b;
    --accent: #7c7ff0;
    --accent-hover: #9598ff;
    --accent-light: #1c1c3a;
    --border: #1f1f1f;
    --hover-bg: #1a1a1a;
    --selected-bg: #1c1c3a;
    --cmd-bg: #141414;
    --shadow-dropdown: 0 12px 40px rgba(0,0,0,.60);
    --overlay: rgba(0,0,0,.65);
    --toast-bg: #374151;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background .3s, color .3s;
    overflow-x: hidden;
  }

  .app-layout {
    display: flex;
    min-height: 100vh;
  }

  /* ---- sidebar ---- */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 50;
    transition: width .2s ease;
    overflow: hidden;
  }
  .sidebar.collapsed {
    width: var(--sidebar-collapsed);
  }
  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 14px; height: 52px;
  }
  .sidebar-logo { font-size: 15px; font-weight: 600; white-space: nowrap; }
  .sidebar-toggle {
    background: none; border: none; color: var(--text-secondary); cursor: pointer;
    width: 28px; height: 28px; border-radius: 6px; display: flex;
    align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0;
  }
  .sidebar-toggle:hover { color: var(--text); background: var(--hover-bg); }
  .sidebar.collapsed .sidebar-toggle svg { transform: rotate(180deg); }
  .sidebar.collapsed .sidebar-logo,
  .sidebar.collapsed .sidebar-footer,
  .sidebar.collapsed .cat-name,
  .sidebar.collapsed .cat-count { display: none; }
  .sidebar.collapsed .sidebar-nav { padding: 8px 0; }
  .sidebar.collapsed .cat-item { justify-content: center; padding: 10px 0; }

  .sidebar-nav { flex: 1; overflow-y: auto; padding: 4px 8px; }
  .cat-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border-radius: 6px; cursor: pointer;
    font-size: 14px; color: var(--text-secondary); transition: all .15s;
    position: relative; margin-bottom: 1px;
  }
  .cat-item:hover { background: var(--hover-bg); color: var(--text); }
  .cat-item.active {
    background: var(--selected-bg); color: var(--accent);
    box-shadow: inset 2px 0 0 var(--accent);
  }
  .cat-icon { font-size: 16px; flex-shrink: 0; }
  .cat-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cat-count {
    font-size: 11px; background: var(--border); color: var(--text-secondary);
    padding: 1px 7px; border-radius: 10px; min-width: 20px; text-align: center;
  }

  .sidebar-footer { padding: 8px; border-top: 1px solid var(--border); }
  .btn-new-cat {
    width: 100%; text-align: left; background: none; border: none;
    color: var(--text-secondary); font-size: 13px; cursor: pointer;
    padding: 8px 12px; border-radius: 6px; transition: all .15s;
    font-family: inherit;
  }
  .btn-new-cat:hover { color: var(--text); background: var(--hover-bg); }

  /* ---- main ---- */
  .main {
    flex: 1; margin-left: var(--sidebar-width);
    max-width: 900px; width: 100%;
    padding: 32px 40px 60px;
    transition: margin-left .2s ease;
  }
  .sidebar.collapsed ~ .main { margin-left: var(--sidebar-collapsed); }

  .command-bar { position: relative; margin-bottom: 20px; }
  .cmd-input {
    width: 100%; padding: 10px 14px 10px 36px; border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 14px; background: var(--cmd-bg);
    color: var(--text); outline: none; font-family: inherit;
    transition: border-color .15s, box-shadow .15s;
  }
  .cmd-input::placeholder { color: var(--text-secondary); }
  .cmd-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(91,95,217,.12);
  }
  .cmd-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 14px; opacity: .4; pointer-events: none; }

  .cmd-dropdown {
    display: none; position: absolute; top: calc(100% + 4px);
    left: 0; right: 0; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow-dropdown);
    z-index: 60; max-height: 360px; overflow-y: auto;
  }
  .cmd-dropdown.open { display: block; }
  .cmd-results { border-bottom: 1px solid var(--border); }
  .cmd-result-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; cursor: pointer; font-size: 13px;
    transition: background .1s;
  }
  .cmd-result-item:hover { background: var(--hover-bg); }
  .cmd-result-item .result-text { flex: 1; }
  .cmd-result-item .result-meta { font-size: 11px; color: var(--text-secondary); }
  .cmd-empty { padding: 20px; text-align: center; color: var(--text-secondary); font-size: 13px; }

  .cmd-actions { padding: 4px 0; }
  .cmd-action {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 10px 14px; background: none; border: none;
    color: var(--text-secondary); font-size: 13px; cursor: pointer;
    font-family: inherit; transition: all .1s; text-align: left;
  }
  .cmd-action:hover { background: var(--hover-bg); color: var(--text); }

  .stats-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 12px; margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    gap: 12px; flex-wrap: wrap;
  }
  .stats-info { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-secondary); }
  .stats-dot { color: var(--border); }
  .progress-mini { width: 60px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-mini-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s ease; }

  .stats-tools { display: flex; align-items: center; gap: 6px; }
  .filter-select, .sort-select {
    font-size: 12px; padding: 4px 8px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--bg); color: var(--text-secondary);
    cursor: pointer; outline: none; font-family: inherit;
    transition: border-color .15s;
  }
  .filter-select:focus, .sort-select:focus { border-color: var(--accent); }
  .icon-btn-mini {
    width: 30px; height: 30px; border-radius: 6px; border: 1px solid transparent;
    background: none; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; color: var(--text-secondary);
  }
  .icon-btn-mini:hover { background: var(--hover-bg); color: var(--text); }

  .add-row {
    display: flex; align-items: center; gap: 12px;
    padding: 0 0 12px 0; margin-bottom: 0;
  }
  .add-prio-bar {
    width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0;
  }
  .prio-high-bar { background: var(--prio-high); }
  .prio-med-bar { background: var(--prio-med); }
  .prio-low-bar { background: var(--prio-low); }

  .add-checkbox-placeholder {
    width: 20px; height: 20px; border-radius: 50%; border: 2px dashed var(--border);
    flex-shrink: 0; background: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--text-secondary); transition: all .15s;
  }
  .add-checkbox-placeholder:hover { border-color: var(--accent); color: var(--accent); }

  .add-input-area { flex: 1; min-width: 0; }
  .add-input {
    width: 100%; border: none; outline: none; font-size: 14px;
    background: transparent; color: var(--text); font-family: inherit;
    padding: 4px 0;
  }
  .add-input::placeholder { color: var(--text-secondary); }
  .add-options {
    display: none; gap: 6px; margin-top: 8px; align-items: center; flex-wrap: wrap;
  }
  .add-options.open { display: flex; }
  .add-select, .add-date {
    font-size: 12px; padding: 4px 8px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--bg); color: var(--text);
    cursor: pointer; outline: none; font-family: inherit;
  }
  .add-date { color-scheme: light; }
  body.dark .add-date { color-scheme: dark; }

  .task-list { display: flex; flex-direction: column; }
  .todo-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
    transition: background .15s; position: relative;
    animation: slideIn .2s ease;
    min-height: 48px;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideOut { from { opacity: 1; transform: translateX(0); } to { opacity: 0; transform: translateX(40px); } }
  .todo-item.removing { animation: slideOut .2s ease forwards; }
  .todo-item.overdue { background: var(--danger-light); }
  .todo-item.overdue .todo-prio-bar { background: var(--prio-high); }

  .todo-item:hover { background: var(--hover-bg); }
  .todo-item:hover .todo-actions { opacity: 1; }

  .todo-prio-bar {
    width: 3px; height: 24px; border-radius: 2px; flex-shrink: 0; transition: background .15s;
  }
  .todo-prio-bar.prio-high { background: var(--prio-high); }
  .todo-prio-bar.prio-med { background: var(--prio-med); }
  .todo-prio-bar.prio-low { background: var(--prio-low); }

  .todo-checkbox {
    appearance: none; width: 18px; height: 18px; border: 2px solid #d1d5db;
    border-radius: 50%; flex-shrink: 0; cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .todo-checkbox:hover { border-color: var(--accent); }
  .todo-checkbox:checked {
    background: var(--accent); border-color: var(--accent);
  }
  .todo-checkbox:checked::after { content: "\2713"; color: #fff; font-size: 10px; font-weight: 700; }

  .todo-content { flex: 1; min-width: 0; cursor: pointer; }
  .todo-text {
    font-size: 14px; line-height: 1.4; word-break: break-word;
  }
  .todo-text:focus {
    outline: 2px solid var(--accent); outline-offset: 4px;
    border-radius: 4px; background: var(--accent-light);
    padding: 2px 4px; margin: -2px -4px;
  }
  .todo-meta {
    display: flex; gap: 8px; flex-wrap: wrap; font-size: 12px;
    color: var(--text-secondary); margin-top: 2px;
  }
  .todo-meta .meta-cat { }
  .todo-meta .meta-due { }
  .todo-meta .meta-due.overdue { color: var(--prio-high); font-weight: 500; }
  .todo-meta .meta-due.today { color: var(--prio-med); font-weight: 500; }
  .todo-meta .meta-time { }

  .todo-item.done .todo-prio-bar { opacity: .3; }
  .todo-item.done .todo-text { text-decoration: line-through; color: var(--done-color); }

  .todo-actions {
    display: flex; gap: 2px; flex-shrink: 0; opacity: 0; transition: opacity .15s;
  }
  .todo-actions button {
    background: none; border: none; color: var(--text-secondary); cursor: pointer;
    font-size: 16px; line-height: 1; padding: 4px 5px; border-radius: 4px;
    transition: all .15s;
  }
  .todo-actions button:hover { color: var(--text); background: var(--border); }
  .todo-actions .btn-del:hover { color: var(--danger); background: var(--danger-light); }

  .empty-state {
    text-align: center; padding: 60px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .empty-state .empty-icon { font-size: 40px; opacity: .5; }
  .empty-state .empty-text { color: var(--text-secondary); font-size: 14px; }

  .bottom-bar {
    display: flex; justify-content: center; gap: 12px;
    padding: 24px 0 0; border-top: 1px solid var(--border); margin-top: 24px;
  }
  .btn-text {
    background: none; border: 1px solid var(--border); color: var(--text-secondary);
    cursor: pointer; font-size: 12px; padding: 6px 16px; border-radius: 6px;
    transition: all .15s; font-family: inherit;
  }
  .btn-text:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .btn-text-danger:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-light); }

  /* ---- toast ---- */
  .toast-container { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 200; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .toast {
    background: var(--toast-bg); color: #fff; padding: 10px 20px;
    border-radius: 20px; font-size: 13px; box-shadow: 0 12px 40px rgba(0,0,0,.20);
    display: flex; align-items: center; gap: 12px;
    animation: toastIn .25s ease;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .toast button { background: none; border: none; color: var(--accent); cursor: pointer; font-weight: 600; font-size: 13px; }

  /* ---- mobile menu ---- */
  .mobile-menu-btn { display: none; }

  /* ---- responsive ---- */
  @media (max-width: 768px) {
    .mobile-menu-btn { display: flex; }
    .sidebar { transform: translateX(-100%); transition: transform .2s ease; }
    .sidebar.mobile-open { transform: translateX(0); }
    .main { margin-left: 0 !important; padding: 20px 16px 40px; }
    .stats-bar { flex-direction: column; align-items: stretch; }
    .stats-tools { justify-content: flex-end; }
  }
  @media (max-width: 480px) {
    .add-options { flex-direction: column; }
    .cmd-dropdown { position: fixed; left: 16px; right: 16px; top: auto; }
  }

</style>
</head>
<body>
<div class="app-layout">
  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">Todo</span>
      <button class="sidebar-toggle" id="btn-toggle-sidebar" title="折叠侧边栏 (Ctrl+B)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="10,3 5,8 10,13"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- 动态渲染分类列表 -->
    </nav>
    <div class="sidebar-footer">
      <button class="btn-new-cat" id="btn-new-cat">+ 新分类</button>
    </div>
  </aside>

  <!-- 主内容 -->
  <main class="main">
    <!-- 命令栏 -->
    <div class="command-bar" id="command-bar">
      <span class="cmd-icon">🔍</span>
      <input type="text" id="cmd-input" class="cmd-input" placeholder="搜索或输入命令... (Ctrl+K)" autocomplete="off">
      <div class="cmd-dropdown" id="cmd-dropdown">
        <div class="cmd-results" id="cmd-results"></div>
        <div class="cmd-actions" id="cmd-actions">
          <button class="cmd-action" data-action="add">＋ 添加任务</button>
          <button class="cmd-action" data-action="clear-done">🗑 清除已完成</button>
          <button class="cmd-action" data-action="export">📤 导出数据</button>
        </div>
      </div>
    </div>

    <!-- 移动端汉堡菜单 -->
    <button class="mobile-menu-btn" id="btn-mobile-menu" title="菜单">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/>
      </svg>
    </button>

    <!-- 统计条 -->
    <div class="stats-bar">
      <div class="stats-info">
        <span id="stats-text">3 项未完成 · 共 5 项</span>
        <span class="stats-dot">·</span>
        <div class="progress-mini" id="progress-mini">
          <div class="progress-mini-fill" id="progress-mini-fill"></div>
        </div>
        <span id="progress-pct">60%</span>
      </div>
      <div class="stats-tools">
        <select id="filter-select" class="filter-select">
          <option value="all">全部</option>
          <option value="active">未完成</option>
          <option value="done">已完成</option>
          <option value="high">高优先</option>
          <option value="overdue">已逾期</option>
        </select>
        <select id="sort-select" class="sort-select">
          <option value="newest">最新优先</option>
          <option value="oldest">最早优先</option>
          <option value="priority">优先级</option>
          <option value="due">截止日期</option>
          <option value="name">名称 A-Z</option>
        </select>
        <button class="icon-btn-mini" id="btn-theme" title="主题">🌓</button>
        <button class="icon-btn-mini" id="btn-export" title="导出">📤</button>
        <button class="icon-btn-mini" id="btn-import" title="导入">📥</button>
      </div>
    </div>

    <!-- 添加任务行 -->
    <div class="add-row" id="add-row">
      <span class="add-prio-bar prio-med-bar"></span>
      <button class="add-checkbox-placeholder">+</button>
      <div class="add-input-area" id="add-input-area">
        <input type="text" class="add-input" id="add-input" placeholder="添加任务，按回车确认..." maxlength="200">
        <div class="add-options" id="add-options">
          <select id="add-priority" class="add-select">
            <option value="low">低优先</option>
            <option value="med" selected>中优先</option>
            <option value="high">高优先</option>
          </select>
          <select id="add-category" class="add-select">
            <option value="个人">👤 个人</option>
            <option value="工作">💼 工作</option>
            <option value="学习">📚 学习</option>
            <option value="生活">🏠 生活</option>
          </select>
          <input type="date" id="add-due" class="add-date">
        </div>
      </div>
    </div>

    <!-- 任务列表 -->
    <div class="task-list" id="task-list">
      <!-- 动态渲染 -->
    </div>

    <!-- 底部操作 -->
    <div class="bottom-bar">
      <button class="btn-text" id="btn-clear-done">清除已完成</button>
      <button class="btn-text btn-text-danger" id="btn-clear-all">清空全部</button>
    </div>
  </main>
</div>

<!-- 隐藏的 import input -->
<input type="file" id="import-file" accept=".json" style="display:none;">
<!-- Toast 容器 -->
<div class="toast-container" id="toast-container"></div>

<script>
(() => {
  const STORAGE_KEY = 'todo-app-pro-v3';
  const CATEGORIES_KEY = 'todo-categories';
  const SIDEBAR_KEY = 'todo-sidebar-collapsed';
  const ACTIVE_CAT_KEY = 'todo-active-cat';
  const DEFAULT_CATS = ['个人','工作','学习','生活'];
  const CAT_ICONS = { '个人':'👤', '工作':'💼', '学习':'📚', '生活':'🏠' };

  let todos = [];
  let filter = 'all';
  let sortBy = 'newest';
  let activeCat = loadActiveCat(); // null means "all"
  let lastDeleted = null;
  let toastTimer = null;

  const $ = (sel, ctx) => (ctx || document).querySelector(sel);
  const $$ = (sel, ctx) => [...(ctx || document).querySelectorAll(sel)];

  function loadActiveCat() {
    const v = localStorage.getItem(ACTIVE_CAT_KEY);
    return v === 'all' || v === null ? null : v;
  }
  function saveActiveCat() { localStorage.setItem(ACTIVE_CAT_KEY, activeCat || 'all'); }

  function load() { try { todos = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { todos = []; } }
  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(todos)); }

  function loadCategories() {
    try { return JSON.parse(localStorage.getItem(CATEGORIES_KEY)) || [...DEFAULT_CATS]; }
    catch(e) { return [...DEFAULT_CATS]; }
  }
  function saveCategories(cats) { localStorage.setItem(CATEGORIES_KEY, JSON.stringify(cats)); }

  function fmtDate(ts) {
    const d = new Date(ts);
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
  }
  function fmtRelative(ts) {
    const diff = Date.now() - ts;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return '刚刚';
    if (mins < 60) return `${mins} 分钟前`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs} 小时前`;
    const days = Math.floor(hrs / 24);
    if (days < 7) return `${days} 天前`;
    return fmtDate(ts);
  }
  function esc(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }
  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function prioWeight(p) { return {high:0,med:1,low:2}[p] || 1; }
  function isOverdue(t) { return !t.done && t.due && t.due < todayStr(); }
  function isToday(t) { return !t.done && t.due && t.due === todayStr(); }

  function showToast(msg, actionLabel, actionFn) {
    const container = $('#toast-container');
    const old = container.querySelector('.toast');
    if (old) old.remove();
    if (toastTimer) clearTimeout(toastTimer);

    const el = document.createElement('div');
    el.className = 'toast';
    el.innerHTML = `<span>${msg}</span>` + (actionLabel ? `<button>${actionLabel}</button>` : '');
    container.appendChild(el);

    if (actionLabel && actionFn) {
      el.querySelector('button').addEventListener('click', () => { actionFn(); el.remove(); });
    }
    toastTimer = setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .2s';
      setTimeout(() => el.remove(), 200); }, 3000);
  }

  function getCategories() {
    const saved = loadCategories();
    const fromData = todos.map(t => t.cat).filter(Boolean);
    const merged = [...new Set([...DEFAULT_CATS, ...saved, ...fromData])];
    return merged;
  }

  function getFilteredAndSorted() {
    let result = [...todos];
    if (activeCat) result = result.filter(t => (t.cat || '个人') === activeCat);
    switch (filter) {
      case 'active':  result = result.filter(t => !t.done); break;
      case 'done':    result = result.filter(t => t.done); break;
      case 'high':    result = result.filter(t => !t.done && t.priority === 'high'); break;
      case 'overdue': result = result.filter(t => isOverdue(t)); break;
    }
    switch (sortBy) {
      case 'oldest':   result.sort((a,b) => a.ts - b.ts); break;
      case 'priority': result.sort((a,b) => prioWeight(a.priority) - prioWeight(b.priority) || a.ts - b.ts); break;
      case 'due':
        result.sort((a,b) => {
          if (!a.due && !b.due) return a.ts - b.ts;
          if (!a.due) return 1; if (!b.due) return -1;
          return a.due.localeCompare(b.due) || a.ts - b.ts;
        }); break;
      case 'name': result.sort((a,b) => a.text.localeCompare(b.text, 'zh')); break;
      default: result.sort((a,b) => b.ts - a.ts);
    }
    return result;
  }

  function renderSidebar() {
    const nav = $('#sidebar-nav');
    const cats = getCategories();
    const counts = {};
    cats.forEach(c => { counts[c] = todos.filter(t => (t.cat || '个人') === c && !t.done).length; });
    const totalActive = todos.filter(t => !t.done).length;

    nav.innerHTML = `
      <div class="cat-item ${activeCat === null ? 'active' : ''}" data-cat="all">
        <span class="cat-icon">📋</span>
        <span class="cat-name">全部</span>
        <span class="cat-count">${totalActive}</span>
      </div>
      ${cats.map(c => `
        <div class="cat-item ${activeCat === c ? 'active' : ''}" data-cat="${esc(c)}">
          <span class="cat-icon">${CAT_ICONS[c] || '📌'}</span>
          <span class="cat-name">${esc(c)}</span>
          <span class="cat-count">${counts[c] || 0}</span>
        </div>
      `).join('')}
    `;

    nav.querySelectorAll('.cat-item').forEach(item => {
      item.addEventListener('click', () => {
        const cat = item.dataset.cat;
        activeCat = cat === 'all' ? null : cat;
        saveActiveCat();
        renderSidebar();
        renderTaskList();
        $('#sidebar').classList.remove('mobile-open');
      });
    });

    // update add-category select options
    const addCatSelect = $('#add-category');
    if (addCatSelect) {
      addCatSelect.innerHTML = cats.map(c => `<option value="${esc(c)}">${CAT_ICONS[c] || '📌'} ${esc(c)}</option>`).join('');
    }
  }

  function renderTaskList() {
    const filtered = getFilteredAndSorted();
    const list = $('#task-list');
    const activeCount = todos.filter(t => !t.done).length;
    const doneCount = todos.length - activeCount;
    const pct = todos.length ? Math.round((doneCount / todos.length) * 100) : 0;

    $('#stats-text').textContent = `${activeCount} 项未完成 · 共 ${todos.length} 项`;
    $('#progress-pct').textContent = `${pct}%`;
    $('#progress-mini-fill').style.width = pct + '%';

    if (!filtered.length) {
      const msgs = { all:'还没有任务', active:'所有任务已完成 🎉', done:'还没有已完成的任务', high:'没有高优先级任务', overdue:'没有逾期任务 👍' };
      list.innerHTML = `<div class="empty-state"><span class="empty-icon">${filter==='active'?'🎉':'📋'}</span><span class="empty-text">${msgs[filter]||'没有匹配的任务'}</span></div>`;
      return;
    }

    list.innerHTML = filtered.map(t => {
      const idx = todos.indexOf(t);
      const overdue = isOverdue(t);
      const today = isToday(t);
      let dueHtml = '';
      if (t.due) {
        const cls = overdue ? 'overdue' : (today ? 'today' : '');
        dueHtml = `<span class="meta-due ${cls}">📅 ${t.due}${overdue?' (逾期)':(today?' (今天)':'')}</span>`;
      }
      return `
        <div class="todo-item${t.done?' done':''}${overdue?' overdue':''}" data-idx="${idx}">
          <span class="todo-prio-bar prio-${t.priority||'med'}"></span>
          <input type="checkbox" class="todo-checkbox" ${t.done?'checked':''} data-idx="${idx}">
          <div class="todo-content" data-idx="${idx}">
            <span class="todo-text" contenteditable="false">${esc(t.text)}</span>
            <div class="todo-meta">
              <span class="meta-cat">${CAT_ICONS[t.cat]||'📌'} ${esc(t.cat||'个人')}</span>
              ${dueHtml}
              <span class="meta-time">${fmtRelative(t.ts)}</span>
            </div>
          </div>
          <div class="todo-actions">
            <button class="btn-edit" data-idx="${idx}" title="编辑">✎</button>
            <button class="btn-del" data-idx="${idx}" title="删除">×</button>
          </div>
        </div>`;
    }).join('');
  }

  function renderAll() { renderSidebar(); renderTaskList(); }

  function addTodo() {
    const input = $('#add-input');
    const text = input.value.trim();
    if (!text) return;
    const priority = $('#add-priority').value;
    const cat = $('#add-category').value;
    const due = $('#add-due').value || null;
    todos.unshift({ text, done: false, priority, cat, due, ts: Date.now() });
    input.value = '';
    $('#add-due').value = '';
    $('#add-options').classList.remove('open');
    save(); renderAll();
  }

  function toggleTodo(idx) {
    if (idx < 0 || idx >= todos.length) return;
    todos[idx].done = !todos[idx].done;
    if (todos[idx].done) todos[idx].completedTs = Date.now();
    else delete todos[idx].completedTs;
    save(); renderAll();
  }

  function removeTodo(idx) {
    if (idx < 0 || idx >= todos.length) return;
    lastDeleted = { item: todos[idx], idx };
    todos.splice(idx, 1);
    save(); renderAll();
    showToast('已删除', '撤销', () => {
      todos.splice(lastDeleted.idx, 0, lastDeleted.item);
      save(); renderAll(); showToast('已恢复');
    });
  }

  function editTodoText(idx) {
    const el = document.querySelector(`.todo-item[data-idx="${idx}"] .todo-text`);
    if (!el) return;
    el.contentEditable = 'true';
    el.focus();
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function commitEdit(idx) {
    const el = document.querySelector(`.todo-item[data-idx="${idx}"] .todo-text`);
    if (!el || el.contentEditable !== 'true') return;
    el.contentEditable = 'false';
    const text = el.textContent.trim();
    if (text && idx >= 0 && idx < todos.length) { todos[idx].text = text; save(); }
    renderAll();
  }

  function clearDone() {
    const count = todos.filter(t => t.done).length;
    if (!count) return;
    todos = todos.filter(t => !t.done);
    save(); renderAll(); showToast(`已清除 ${count} 项已完成任务`);
  }

  function clearAll() {
    if (!todos.length) return;
    if (!confirm(`确定删除全部 ${todos.length} 项？不可撤销。`)) return;
    todos = []; save(); renderAll(); showToast('已清空全部');
  }

  function handleCommandInput() {
    const q = $('#cmd-input').value.trim().toLowerCase();
    const dropdown = $('#cmd-dropdown');
    const results = $('#cmd-results');
    const actions = $('#cmd-actions');

    if (!q) {
      results.innerHTML = '';
      dropdown.classList.add('open');
      return;
    }

    const matches = todos.filter(t => t.text.toLowerCase().includes(q) || (t.cat||'').toLowerCase().includes(q)).slice(0, 8);
    if (matches.length) {
      results.innerHTML = matches.map(t => {
        const idx = todos.indexOf(t);
        return `<div class="cmd-result-item" data-idx="${idx}">
          <span>${t.done?'✅':'○'}</span>
          <span class="result-text">${esc(t.text)}</span>
          <span class="result-meta">${esc(t.cat||'')}</span>
        </div>`;
      }).join('');
    } else {
      results.innerHTML = `<div class="cmd-empty">无匹配结果，按回车创建新任务</div>`;
    }
    dropdown.classList.add('open');
  }

  function closeCommandDropdown() {
    $('#cmd-dropdown').classList.remove('open');
    $('#cmd-input').value = '';
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(todos,null,2)],{type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `todo-backup-${todayStr()}.json`; a.click();
    URL.revokeObjectURL(url);
    showToast('数据已导出');
  }

  function importData(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!Array.isArray(data)) throw new Error('格式错误');
        for (const t of data) { if (!t.text||typeof t.text!=='string') throw new Error('格式错误'); }
        if (!confirm(`导入 ${data.length} 项任务。确定替换当前数据？取消将合并。`)) {
          const seen = new Set(todos.map(t=>t.text+t.ts));
          todos = [...data.filter(t=>!seen.has(t.text+t.ts)), ...todos];
        } else { todos = data; }
        save(); renderAll(); showToast(`成功导入 ${data.length} 项`);
      } catch(e) { alert('导入失败：JSON 格式不正确'); }
    };
    reader.readAsText(file);
  }

  function applyTheme() {
    const dark = localStorage.getItem('todo-theme')==='dark';
    document.body.classList.toggle('dark', dark);
  }
  function toggleTheme() {
    const dark = !document.body.classList.contains('dark');
    localStorage.setItem('todo-theme', dark?'dark':'light');
    applyTheme();
  }

  let sidebarCollapsed = localStorage.getItem(SIDEBAR_KEY)==='true';
  function applySidebar() { $('#sidebar').classList.toggle('collapsed', sidebarCollapsed); }
  function toggleSidebar() {
    sidebarCollapsed = !sidebarCollapsed;
    localStorage.setItem(SIDEBAR_KEY, sidebarCollapsed);
    applySidebar();
  }

  function bindEvents() {
    // add todo
    $('#add-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); addTodo(); }
    });
    $('#add-input').addEventListener('focus', () => {
      $('#add-options').classList.add('open');
    });
    $('.add-checkbox-placeholder').addEventListener('click', () => {
      $('#add-input').focus();
    });

    // command bar
    $('#cmd-input').addEventListener('input', handleCommandInput);
    $('#cmd-input').addEventListener('focus', () => {
      $('#cmd-dropdown').classList.add('open');
    });
    $('#cmd-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const q = $('#cmd-input').value.trim();
        if (q) {
          const matches = todos.filter(t => t.text.toLowerCase().includes(q.toLowerCase()));
          if (matches.length === 1) {
            // jump to that task
            const idx = todos.indexOf(matches[0]);
            const el = document.querySelector(`.todo-item[data-idx="${idx}"]`);
            if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.background='var(--accent-light)'; setTimeout(()=>el.style.background='',1500); }
          } else {
            // create new task
            $('#add-input').value = q;
            $('#add-input').focus();
            $('#add-options').classList.add('open');
          }
        }
        closeCommandDropdown();
      }
      if (e.key === 'Escape') closeCommandDropdown();
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('.command-bar')) closeCommandDropdown();
    });
    // cmd dropdown clicks
    $('#cmd-dropdown').addEventListener('click', e => {
      const item = e.target.closest('.cmd-result-item');
      const action = e.target.closest('.cmd-action');
      if (item) {
        const idx = Number(item.dataset.idx);
        const el = document.querySelector(`.todo-item[data-idx="${idx}"]`);
        if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.background='var(--accent-light)'; setTimeout(()=>el.style.background='',1500); }
        closeCommandDropdown();
      }
      if (action) {
        const act = action.dataset.action;
        if (act === 'add') { $('#add-input').focus(); $('#add-options').classList.add('open'); }
        if (act === 'clear-done') clearDone();
        if (act === 'export') exportData();
        closeCommandDropdown();
      }
    });

    // task list events
    $('#task-list').addEventListener('click', e => {
      const cb = e.target.closest('.todo-checkbox');
      const del = e.target.closest('.btn-del');
      const edit = e.target.closest('.btn-edit');
      if (cb) { toggleTodo(Number(cb.dataset.idx)); return; }
      if (del) { removeTodo(Number(del.dataset.idx)); return; }
      if (edit) { editTodoText(Number(edit.dataset.idx)); return; }
    });
    $('#task-list').addEventListener('dblclick', e => {
      const content = e.target.closest('.todo-content');
      if (content) editTodoText(Number(content.dataset.idx));
    });
    $('#task-list').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.classList.contains('todo-text')) {
        e.preventDefault();
        const item = e.target.closest('.todo-item');
        if (item) commitEdit(Number(item.dataset.idx));
      }
    });
    $('#task-list').addEventListener('focusout', e => {
      if (e.target.classList.contains('todo-text')) {
        const item = e.target.closest('.todo-item');
        if (item) commitEdit(Number(item.dataset.idx));
      }
    });

    // filter & sort
    $('#filter-select').addEventListener('change', function() { filter = this.value; renderTaskList(); });
    $('#sort-select').addEventListener('change', function() { sortBy = this.value; renderTaskList(); });

    // bottom bar
    $('#btn-clear-done').addEventListener('click', clearDone);
    $('#btn-clear-all').addEventListener('click', clearAll);

    // 移动菜单
    $('#btn-mobile-menu').addEventListener('click', () => {
      $('#sidebar').classList.toggle('mobile-open');
    });

    // sidebar
    $('#btn-toggle-sidebar').addEventListener('click', toggleSidebar);
    $('#btn-new-cat').addEventListener('click', () => {
      const name = prompt('输入新分类名称：');
      if (name && name.trim()) {
        const cats = loadCategories();
        if (!cats.includes(name.trim())) {
          cats.push(name.trim());
          saveCategories(cats);
          // also add as add-category option
          const opt = document.createElement('option');
          opt.value = name.trim();
          opt.textContent = '📌 ' + name.trim();
          $('#add-category').appendChild(opt);
        }
        renderAll();
      }
    });

    // theme
    $('#btn-theme').addEventListener('click', toggleTheme);

    // import/export
    $('#btn-export').addEventListener('click', exportData);
    $('#btn-import').addEventListener('click', () => $('#import-file').click());
    $('#import-file').addEventListener('change', e => {
      if (e.target.files[0]) importData(e.target.files[0]);
      e.target.value = '';
    });

    // global shortcuts
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); $('#cmd-input').focus(); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); $('#add-input').focus(); $('#add-options').classList.add('open'); }
      if ((e.ctrlKey || e.metaKey) && e.key === 'b') { e.preventDefault(); toggleSidebar(); }
    });
  }

  function init() {
    load();
    applyTheme();
    applySidebar();
    bindEvents();
    renderAll();
    // set today as default for due picker
    $('#add-due').value = '';

    // mobile sidebar toggle
    if (window.innerWidth <= 768) {
      // add mobile hamburger if needed
    }
  }

  init();
})();
</script>
</body>
</html>
